<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .forStyleBro{
        background-color: blueviolet;
        width: 150px;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="query.js"  defer></script>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
            
        }
        html, body{
            width:100%;
            height: 100%;
        }
        #main{
            
            width:100%;
            height: 100%;
            background-color:#ddcea9 ;
            padding: 20px;
        }
        input{
            display: block;
        }
        #sub:hover{
           background-color:rgb(168, 184, 234);
           border-radius: 5px;
        }
        .card{
            max-width: 300px;
            color: #080707;
            display: inline-block;
            margin-top: 50px;
            padding: 25px;
            border: 2px solid #9a8b71;
            border-radius: 5px;
        }
        .profile{
            width:100px;
            height: 100px;
            background-color: #935f05;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .card h5{
            margin-top: 3px;
        }
        .profile img{
            width: 100%;
            height:100%;
            object-fit: cover;
        }
        #para{
            font-size: 12px;
            margin-top: 12px;
        }
        
    </style>
</head>
<body>
    <div id="main">
        <form action="">
        <!-- <input type="text" placeholder="your pic "> -->
         <input type="file" placeholder="Your Image">
        <input type="text" placeholder="name">
        <input type="text" placeholder="occupation">
         <input type="text" placeholder="info">
        <input type="submit" id="sub" >
            
        </form>

         </div>

</body>
